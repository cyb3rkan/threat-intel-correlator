# .gitleaks.toml
#
# Local-first defensive tool — secrets must live only in the OS keyring,
# never in source control. This config extends the gitleaks default
# ruleset and adds project-specific allowlists for known false-positive
# patterns (test fixtures, doc comments).
#
# Run locally with:
#   gitleaks detect --config .gitleaks.toml --no-git --redact

title = "tic-gitleaks-config"

# Inherit the upstream default rule set. We do not maintain a custom
# rule list here; new detector types should be picked up automatically.
[extend]
useDefault = true

# ---------------------------------------------------------------------------
# Allowlist — files we know are safe to scan but contain "secret-looking"
# strings that are NOT secrets. Every entry is a deliberate exception.
# ---------------------------------------------------------------------------
[allowlist]
description = "False positives in tests, fixtures, and docs"

# Repository-wide path exclusions.
paths = [
    '''(^|/)backup/''',                       # local pre-cleanup snapshots
    '''(^|/)_misplaced_v0_root_backup_''',    # v0 sandbox dir (gitignored)
    '''(^|/)tests/fixtures/''',                # parser fixtures, never real keys
    '''(^|/)frontend/\.next/''',               # build cache
    '''(^|/)frontend/node_modules/''',
    '''(^|/)poetry\.lock$''',
    '''(^|/)frontend/package-lock\.json$''',
]

# Specific known-safe substrings in source. Each is reviewed during audit;
# do NOT add entries that look like real keys.
regexTarget = "match"
regexes = [
    # Placeholder strings used in tests and docs.
    '''super-secret-misp-key-DO-NOT-LEAK''',
    '''super-secret-ai-key-do-not-leak''',
    '''unit-test-key-not-a-real-secret-32''',
    '''misp\.YOUR-INTERNAL-DOMAIN\.example''',
    # SHA-256/512 hash literals used as IOC examples.
    '''e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855''',
    '''d41d8cd98f00b204e9800998ecf8427e''',
    '''da39a3ee5e6b4b0d3255bfef95601890afd80709''',
]
